    <style>
      html,
      body {
        overflow: auto;
        height: auto;
      }
      body {
        justify-content: flex-start;
        min-height: 100vh;
      }

      main {
        max-width: 2000px;
        height: auto;
        padding: 24px 16px 64px;
        gap: 24px;
        justify-content: flex-start;
      }

      @media (min-width: 640px) {
        main {
          padding: 32px 24px 80px;
          gap: 32px;
        }
      }

      /* index page tag — positioned, not fixed */
      .index-tag {
        position: relative;
        top: auto;
        left: auto;
        opacity: 1;
        animation: none;
      }

      /* header row */
      .index-header {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
      }

      .index-header .index-tag {
        flex-shrink: 0;
      }

      /* separator */
      .divider {
        width: 100%;
        height: 1px;
        background: var(--border);
        margin-top: -12px;
      }

      /* sections */
      .section {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* fallback poster for cards without video */
      .snippet-card .fallback-poster {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
